<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      .bg{fill:#0d1117}.title{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;fill:#e6edf3}
      .subtitle{font-family:'JetBrains Mono',monospace;font-size:13px;fill:#8b949e}
      .tag{font-family:monospace;font-size:9px;fill:#cc9933}
      .bar-bg{fill:#161b22;stroke:#30363d;stroke-width:1}
      @keyframes grow1{from{width:0}to{width:180px}} @keyframes grow2{from{width:0}to{width:140px}} @keyframes grow3{from{width:0}to{width:210px}}
      .b1{animation:grow1 1.5s ease-out forwards;fill:#1f6feb}
      .b2{animation:grow2 1.5s ease-out 0.3s forwards;fill:#8957e5;width:0}
      .b3{animation:grow3 1.5s ease-out 0.6s forwards;fill:#3fb950;width:0}
    </style>
  </defs>
  <rect width="800" height="300" class="bg"/>
  <text x="40" y="50" class="title">verdict</text>
  <text x="40" y="72" class="subtitle">3-dimensional evaluation for LLM agents</text>
  <text x="40" y="90" class="tag">Task completion · Reasoning quality · Tool use accuracy</text>

  <!-- Score bars -->
  <text x="40" y="130" font-family="monospace" font-size="11" fill="#58a6ff">Task Completion</text>
  <rect x="40" y="138" width="300" height="20" rx="4" class="bar-bg"/>
  <rect x="40" y="138" height="20" rx="4" class="b1"/>
  <text x="230" y="152" font-family="monospace" font-size="10" fill="#e6edf3">78%</text>

  <text x="40" y="178" font-family="monospace" font-size="11" fill="#d2a8ff">Reasoning Quality</text>
  <rect x="40" y="186" width="300" height="20" rx="4" class="bar-bg"/>
  <rect x="40" y="186" height="20" rx="4" class="b2"/>
  <text x="190" y="200" font-family="monospace" font-size="10" fill="#e6edf3">61%</text>

  <text x="40" y="226" font-family="monospace" font-size="11" fill="#3fb950">Tool Use Accuracy</text>
  <rect x="40" y="234" width="300" height="20" rx="4" class="bar-bg"/>
  <rect x="40" y="234" height="20" rx="4" class="b3"/>
  <text x="258" y="248" font-family="monospace" font-size="10" fill="#e6edf3">89%</text>

  <!-- Composite score -->
  <rect x="430" y="120" width="180" height="120" rx="12" fill="#161b22" stroke="#cc9933" stroke-width="2"/>
  <text x="520" y="155" font-family="monospace" font-size="14" fill="#cc9933" text-anchor="middle">Composite</text>
  <text x="520" y="185" font-family="monospace" font-size="36" font-weight="700" fill="#e6edf3" text-anchor="middle">76%</text>
  <text x="520" y="218" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">3 cases · 2 passed</text>

  <!-- Report label -->
  <rect x="650" y="185" width="110" height="30" rx="8" fill="#1a3320" stroke="#238636"/>
  <text x="705" y="205" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">EvalReport ✓</text>
</svg>
