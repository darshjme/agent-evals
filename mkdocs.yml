site_name: agent-evals
site_description: Production-grade LLM agent evaluation framework
site_url: https://darshjme.github.io/agent-evals
repo_url: https://github.com/darshjme/agent-evals
repo_name: darshjme/agent-evals

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

nav:
  - Home: index.md
  - API Reference:
    - AgentEvaluator: api/evaluator.md
    - EvalCase: api/eval_case.md
    - EvalReport: api/eval_report.md
  - Benchmarks: benchmarks.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
